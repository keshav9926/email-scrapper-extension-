<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Email Scraper Dashboard</title>
  <!-- Modern Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="glow-dot"></div>
        <h1>LinkedIn Email Scraper</h1>
      </div>
      <div class="status-badge" id="statusBadge">Idle</div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      
      <!-- Upload Section -->
      <section id="uploadSection" class="card upload-card">
        <div class="upload-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".xlsx, .xls" />
          <svg class="upload-icon" viewBox="0 0 24 24" width="48" height="48">
            <path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
          </svg>
          <h3>Upload Excel File</h3>
          <p>Drag and drop your spreadsheet here or click to browse</p>
          <span class="file-spec">Supported formats: .xlsx, .xls</span>
        </div>
        
      </section>

      <!-- Dashboard Statistics (Hidden initially) -->
      <section id="dashboardSection" class="card dashboard-card hidden">
        <!-- Progress Block -->
        <div class="progress-container">
          <div class="progress-label">
            <span>Overall Progress</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBarFill"></div>
          </div>
        </div>

        <!-- Grid Cards -->
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-val" id="statTotal">0</span>
            <span class="stat-lbl">Total URLs</span>
          </div>
          <div class="stat-item">
            <span class="stat-val text-primary" id="statProcessed">0</span>
            <span class="stat-lbl">Processed</span>
          </div>
          <div class="stat-item">
            <span class="stat-val text-success" id="statFound">0</span>
            <span class="stat-lbl">Emails Found</span>
          </div>
          <div class="stat-item">
            <span class="stat-val text-warning" id="statRemaining">0</span>
            <span class="stat-lbl">Remaining</span>
          </div>
        </div>

        <!-- Automation Controls -->
        <div class="controls-area">
          <button id="btnPause" class="btn btn-secondary hidden">
            <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            Pause
          </button>
          <button id="btnResume" class="btn btn-primary hidden">
            <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            Resume
          </button>
          <button id="btnDownload" class="btn btn-success">
            <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
            Download Results
          </button>
          <button id="btnStop" class="btn btn-danger">
            <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 19h12V5H6v14z"/></svg>
            Stop / Clear
          </button>
        </div>
      </section>

      <!-- Logs / Console -->
      <section class="card console-card">
        <div class="console-header">
          <h3>Live Activity Console</h3>
          <button id="btnClearLogs" class="btn-text">Clear Console</button>
        </div>
        <div class="console-body" id="consoleLogs">
          <div class="log-line log-system">Console initialized. Waiting for Excel upload...</div>
        </div>
      </section>

    </main>
  </div>

  <!-- Local Script Dependencies -->
  <script src="excel/xlsx.full.min.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
